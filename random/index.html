<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Random site - Loopback Webring</title>
</head>
<body>
<p id="msg">Picking a random site...</p>
<script src="../webring.js"></script>
<script>
  CONFIG.dataUrl = "../webring.json";
  (async function () {
    var msg = document.getElementById("msg");
    try {
      var members = await loadMembers();
      var target = randomMember(members, "");
      if (target && target.url) { location.replace(target.url); return; }
      msg.innerHTML = 'The ring is empty. <a href="../">Back to the directory</a>';
    } catch (e) {
      msg.innerHTML = 'The ring is unreachable. <a href="../">Back to the directory</a>';
    }
  })();
</script>
</body>
</html>
