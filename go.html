<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Loopback Webring</title>
</head>
<body>
<p id="msg">Routing you onward...</p>
<script src="webring.js"></script>
<script>
  (async function () {
    var msg = document.getElementById("msg");
    var params = new URLSearchParams(location.search);
    try {
      var members = await loadMembers();
      var target = resolveTarget(members, params);
      if (target && target.url) { location.replace(target.url); return; }
      var from = (params.get("from") || "(none)").replace(/[<>&]/g, "");
      msg.innerHTML = 'Could not find "' + from + '" in the ring. ' +
        '<a href="./">Back to the directory</a> | <a href="random/">Random site</a>';
    } catch (e) {
      msg.innerHTML = 'The ring is unreachable. <a href="./">Back to the directory</a>';
    }
  })();
</script>
</body>
</html>
